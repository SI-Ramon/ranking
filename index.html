<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ranking - Desbravadores</title>

<style>
/* ===== base ===== */
body{
  font-family: Arial, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}
.wrap{max-width:1000px;margin:auto;padding:30px;}
h1{text-align:center;}
.updated{text-align:center;opacity:.8;margin-bottom:20px;}

/* ===== podium grid ===== */
.podium{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-bottom:40px;
  justify-items:center; /* centraliza cada card no grid cell */
}

/* ===== card ===== */
.card{
  position: relative;       /* necessário para posicionar avatar absoluto */
  overflow: visible;        /* permite avatar "sair" do card sem ser cortado */
  background: rgba(255,255,255,.1);
  padding: 24px 20px 20px;  /* top padding para espaçar conteúdo abaixo do avatar */
  border-radius: 15px;
  text-align: center;
  min-height: 260px;        /* altura mínima para caber avatar + texto */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  box-sizing: border-box;
}

/* cores pódio */
.gold { background: rgba(255,215,0,.35); }
.silver { background: rgba(192,192,192,.30); }
.bronze { background: rgba(205,127,50,.30); }

/* ===== avatares ===== */
/* avatar do pódio (maior) - posicionado absoluto para não ser cortado */
.avatar{
  position: absolute;
  top: -46px;                 /* metade do tamanho do avatar (ajustável) */
  left: 50%;
  transform: translateX(-50%);
  width: 92px;
  height: 92px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.12);
  z-index: 2;
  box-shadow: 0 6px 18px rgba(0,0,0,.35);
  display: block;
}

/* avatar pequeno na tabela */
.avatar-sm{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.15);
}

/* ===== texto dentro do card ===== */
.card h3{ margin-top: 10px; margin-bottom: 8px; font-size:18px; }
.card strong{ display:block; font-size:18px; margin-bottom:8px; }
.card p{ margin:0; font-size:16px; color: #fff; opacity: .95; }

/* ===== tabela ===== */
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.12);}
th{text-align:left;}
.right{text-align:right;}
.rowflex{display:flex;align-items:center;gap:10px;}
.muted{opacity:.75;font-size:.9rem;margin-top:10px;}

/* ===== responsivo ===== */
/* tablets / pequenos laptops */
@media (max-width: 900px){
  .podium{ grid-template-columns: repeat(3, 1fr); gap:14px; }
  .card{ min-height: 260px; padding-top: 34px; }
  .avatar{ width: 88px; height:88px; top: -44px; }
}

/* celulares (vertical) */
@media (max-width: 480px){
  .podium{ grid-template-columns: repeat(3, 1fr); gap:10px; }
  .card{ min-height: 240px; padding-top: 32px; border-radius: 18px; }
  .avatar{ width: 76px; height:76px; top: -38px; }
  .card h3{ font-size:16px; }
  .card strong{ font-size:16px; }
  .card p{ font-size:14px; }

  /* se for muito estreito, reduzir tabela padding */
  th, td{ padding: 8px; }
}

/* muito pequeno (ex.: <360px), empilha 1 por vez se preferir */
@media (max-width: 320px){
  .podium{ grid-template-columns: repeat(1, 1fr); }
  .card{ min-height: 220px; padding-top: 28px; }
  .avatar{ width:70px; height:70px; top:-35px; }
}
</style>
</head>

<body>
<div class="wrap">
  <h1>🏆 Ranking Oficial</h1>
  <div class="updated" id="updated">Atualizando...</div>

  <div class="podium" id="podium"></div>

  <h2>📋 Ranking Completo</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Desbravador</th>
        <th class="right">Pontos</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="muted" id="status"></div>
</div>

<script>
/* -------------------------
  Seu JS atual pode ficar aqui (mantive a versão funcional).
  O estilo e posicionamento do avatar já foram ajustados via CSS acima.
---------------------------*/
const SHEET_ID = "1XSBKPMg4nlzAJpACvZ5hCumqOyFPFIIRqV60gghP43E";
const SHEET_NAME = "RANKING";
const query = encodeURIComponent("select A, B, C where A is not null order by B desc");
const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tq=${query}`;

function parseGViz(text){
  const start = text.indexOf("{");
  const end = text.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Resposta gviz inválida.");
  return JSON.parse(text.substring(start, end + 1));
}

function normalizeDriveImage(raw){
  if (!raw) return "";
  let u = String(raw).trim();
  const mImg = u.match(/IMAGE\(\"(.*)\"\)/i);
  if (mImg && mImg[1]) u = mImg[1].trim();
  const m1 = u.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m1 && m1[1]) return `https://drive.google.com/uc?export=view&id=${m1[1]}`;
  const m2 = u.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
  if (m2 && m2[1]) return `https://drive.google.com/uc?export=view&id=${m2[1]}`;
  const m3 = u.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m3 && m3[1] && u.includes("drive.google.com")) {
    return `https://drive.google.com/uc?export=view&id=${m3[1]}`;
  }
  return u;
}
function driveAlt(u){
  const m = u.match(/uc\?export=view&id=([a-zA-Z0-9_-]+)/);
  if (m && m[1]) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
  return u;
}
function bust(u){
  if (!u) return u;
  const sep = u.includes("?") ? "&" : "?";
  return `${u}${sep}t=${Date.now()}`;
}
function makeImg(photoUrl, cls, alt){
  const img = document.createElement("img");
  img.className = cls;
  img.alt = alt;
  img.referrerPolicy = "no-referrer";
  img.crossOrigin = "anonymous";
  const initial = photoUrl ? bust(photoUrl) : '';
  img.src = initial || '';
  img.onerror = () => {
    if (photoUrl && photoUrl.includes("drive.google.com") && !img.dataset.triedAlt) {
      img.dataset.triedAlt = "1";
      const altUrl = bust(driveAlt(photoUrl));
      img.src = altUrl;
      return;
    }
    // se falhar, deixamos src vazio — CSS mostra fundo neutro do avatar
    img.src = '';
  };
  return img;
}

function updateTime(){
  document.getElementById("updated").innerText =
    "Atualizado em: " + new Date().toLocaleString("pt-BR");
}

async function load(){
  const status = document.getElementById("status");
  status.textContent = "";
  const res = await fetch(url, { cache: "no-store" });
  const text = await res.text();
  const data = parseGViz(text);
  const rows = (data.table.rows || []).map(r => {
    const name = r.c?.[0]?.v || "";
    const pts = r.c?.[1]?.v || 0;
    const photoRaw = r.c?.[2]?.v || "";
    const photoFinal = normalizeDriveImage(photoRaw);
    return { name, pts, photoRaw, photoFinal };
  }).filter(x => x.name);
  const podium = document.getElementById("podium");
  podium.innerHTML = "";
  const styles = ["gold","silver","bronze","",""];
  rows.slice(0,5).forEach((p,i)=>{
    const div = document.createElement("div");
    div.className = "card " + styles[i];
    // avatar absoluto dentro do card
    const img = makeImg(p.photoFinal, "avatar", `Foto de ${p.name}`);
    div.appendChild(img);

    const h3 = document.createElement("h3");
    h3.textContent = `${i+1}º Lugar`;
    div.appendChild(h3);

    const strong = document.createElement("strong");
    strong.textContent = p.name;
    div.appendChild(strong);

    const pEl = document.createElement("p");
    pEl.textContent = `${p.pts} pontos`;
    div.appendChild(pEl);

    podium.appendChild(div);
  });

  // TABELA
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  rows.forEach((p,i)=>{
    const tr = document.createElement("tr");
    const tdPos = document.createElement("td");
    tdPos.textContent = i+1;
    const tdName = document.createElement("td");
    const wrap = document.createElement("div");
    wrap.className = "rowflex";
    const photo = makeImg(p.photoFinal, "avatar-sm", `Foto de ${p.name}`);
    wrap.appendChild(photo);
    const span = document.createElement("span");
    span.textContent = p.name;
    wrap.appendChild(span);
    tdName.appendChild(wrap);
    const tdPts = document.createElement("td");
    tdPts.className = "right";
    tdPts.textContent = p.pts;
    tr.appendChild(tdPos);
    tr.appendChild(tdName);
    tr.appendChild(tdPts);
    tbody.appendChild(tr);
  });

  updateTime();
}

load().catch(err => {
  document.getElementById("status").textContent = "Erro ao carregar: " + (err?.message || err);
  console.error(err);
});
setInterval(() => load().catch(console.error), 60000);
</script>

</body>
</html>
