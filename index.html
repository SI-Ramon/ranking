<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ranking - Desbravadores</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}
.wrap{max-width:1000px;margin:auto;padding:30px;}
h1{text-align:center;}
.updated{text-align:center;opacity:.8;margin-bottom:20px;}

.podium{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-bottom:40px;
}

.card{
  background:rgba(255,255,255,.1);
  padding:20px;
  border-radius:15px;
  text-align:center;
  overflow:hidden;
}
.gold{background:rgba(255,215,0,.35);}
.silver{background:rgba(192,192,192,.30);}
.bronze{background:rgba(205,127,50,.30);}

table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.2);}
th{text-align:left;}
.right{text-align:right;}

.avatar{
  width:72px;height:72px;border-radius:50%;
  object-fit:cover;display:block;margin:0 auto 10px;
  border:2px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.15);
}
.avatar-sm{
  width:34px;height:34px;border-radius:50%;
  object-fit:cover;border:1px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.15);
}
.rowflex{display:flex;align-items:center;gap:10px;}
.muted{opacity:.75;font-size:.9rem;}
</style>
</head>

<body>
<div class="wrap">
  <h1>🏆 Ranking Oficial</h1>
  <div class="updated" id="updated">Atualizando...</div>

  <div class="podium" id="podium"></div>

  <h2>📋 Ranking Completo</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Desbravador</th>
        <th class="right">Pontos</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="muted" id="status"></div>
</div>

<script>
const SHEET_ID = "1XSBKPMg4nlzAJpACvZ5hCumqOyFPFIIRqV60gghP43E";
const SHEET_NAME = "RANKING";

// Busca A (nome), B (pontos), C (foto)
const query = encodeURIComponent("select A, B, C where A is not null order by B desc");
const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tq=${query}`;

// Parse do gviz
function parseGViz(text){
  const start = text.indexOf("{");
  const end = text.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Resposta gviz inválida.");
  return JSON.parse(text.substring(start, end + 1));
}

// Converte links do Drive comuns em link direto
function normalizeDriveImage(raw){
  if (!raw) return "";

  let url = String(raw).trim();

  // Suporta célula com fórmula =IMAGE("...") retornando algo parecido
  // (às vezes o gviz devolve string com IMAGE)
  const mImg = url.match(/IMAGE\(\"(.*)\"\)/i);
  if (mImg && mImg[1]) url = mImg[1].trim();

  // Links do Drive comuns
  const m1 = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m1 && m1[1]) return `https://drive.google.com/uc?export=view&id=${m1[1]}`;

  const m2 = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
  if (m2 && m2[1]) return `https://drive.google.com/uc?export=view&id=${m2[1]}`;

  const m3 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m3 && m3[1] && url.includes("drive.google.com")) {
    return `https://drive.google.com/uc?export=view&id=${m3[1]}`;
  }

  // Se já veio no formato uc?export=view, mantém
  return url;
}

// Evita cache da imagem (às vezes o navegador “trava” a primeira falha)
function withCacheBuster(imgUrl){
  if (!imgUrl) return "";
  const sep = imgUrl.includes("?") ? "&" : "?";
  return `${imgUrl}${sep}t=${Date.now()}`;
}

// Render de IMG com fallback (se falhar, esconde)
function imgTag(url, cls, alt){
  const safe = withCacheBuster(url);
  return `<img class="${cls}" src="${safe}" alt="${alt}"
    referrerpolicy="no-referrer"
    crossorigin="anonymous"
    onerror="this.style.display='none';">`;
}

function updateTime(){
  document.getElementById("updated").innerText =
    "Atualizado em: " + new Date().toLocaleString("pt-BR");
}

async function load(){
  const status = document.getElementById("status");
  status.textContent = "";

  try{
    const res = await fetch(url, { cache: "no-store" });
    const text = await res.text();
    const data = parseGViz(text);

    const rows = (data.table.rows || []).map(r => ({
      name: r.c?.[0]?.v || "",
      pts: r.c?.[1]?.v || 0,
      photo: normalizeDriveImage(r.c?.[2]?.v || "")
    })).filter(x => x.name);

    // PODIUM TOP 5
    const podium = document.getElementById("podium");
    podium.innerHTML = "";
    const styles = ["gold","silver","bronze","",""];

    rows.slice(0,5).forEach((p,i)=>{
      const div = document.createElement("div");
      div.className = "card " + styles[i];

      const photoHtml = p.photo ? imgTag(p.photo, "avatar", `Foto de ${p.name}`) : "";

      div.innerHTML = `
        ${photoHtml}
        <h3>${i+1}º Lugar</h3>
        <strong>${p.name}</strong>
        <p>${p.pts} pontos</p>
      `;
      podium.appendChild(div);
    });

    // TABELA COMPLETA
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    rows.forEach((p,i)=>{
      const tr = document.createElement("tr");
      const photoHtml = p.photo ? imgTag(p.photo, "avatar-sm", `Foto de ${p.name}`) : "";

      tr.innerHTML = `
        <td>${i+1}</td>
        <td>
          <div class="rowflex">
            ${photoHtml}
            <span>${p.name}</span>
          </div>
        </td>
        <td class="right">${p.pts}</td>
      `;
      tbody.appendChild(tr);
    });

    updateTime();
  }catch(err){
    status.textContent = "Erro ao carregar dados: " + (err?.message || err);
  }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
